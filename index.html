const SCHED_DATES = ["23 มี.ค. 69","24 มี.ค. 69","25 มี.ค. 69","26 มี.ค. 69","27 มี.ค. 69"];
const SCHED_ISO = ["2026-03-23","2026-03-24","2026-03-25","2026-03-26","2026-03-27"];

function getExamDate(unit) {
  return UNIT_DATE_MAP[unit] || "-";
}

function getTodaySchedDate() {
  const today = new Date().toISOString().slice(0,10);
  const idx = SCHED_ISO.indexOf(today);
  return idx >= 0 ? SCHED_DATES[idx] : null;
}

function getLabs(p) {
  let labs;
  if (p.right === "ประกันสังคม") {
    if (!p.lab) labs = [];
    else labs = p.lab.split(",").map(s => s.trim()).filter(Boolean);
  } else if (p.age < 35) {
    labs = ["CBC","Urine Analysis","CXR"];
  } else {
    labs = ["CBC","Urine Analysis","FBS","BUN","Creatinine","Cholesterol","Triglyceride","Uric acid","AST","ALT","ALP","CXR"];
  }
  if (!labs.some(l => l === "CXR" || l === "X-Ray")) labs.push("CXR");
  return labs;
}

function fmtId(id) {
  if (!id || id.length !== 13) return id;
  return `${id[0]}-${id.slice(1,5)}-${id.slice(5,10)}-${id.slice(10,12)}-${id[12]}`;
}

              <span className="topbar-org">กลุ่มงานบริการด้านปฐมภูมิและองค์รวม</span>
              <span className="topbar-hosp">โรงพยาบาลทับคล้อ</span>
            </div>
          </div>
          <span className="topbar-year">ปีงบประมาณ 2569</span>
        </div>
      </header>

      {/* HERO */}
      <div className="hero">
        <div className="container">
          <h1 className="hero-title">ตรวจสอบรายการตรวจสุขภาพประจำปี</h1>
          <p className="hero-sub">กรอกเลขบัตรประชาชน 13 หลัก เพื่อตรวจสอบรายการของท่าน</p>
        </div>
      </div>

      {/* MAIN */}
      <main className="container main">

        {/* SEARCH */}
        <section className="search-section">
          <label className="label" htmlFor="q">เลขบัตรประชาชน หรือ ชื่อ-นามสกุล</label>
          <div className="search-row">
            <input ref={ref} id="q" value={q} inputMode="text"
              onChange={e=>{setQ(e.target.value);if(err)setErr("");}}
              onKeyDown={e=>{if(e.key==="Enter")doSearch();}}
              placeholder="กรอกเลข 13 หลัก หรือชื่อ"
              className={`search-input ${err?"search-input-err":""}`}
            />
            <button onClick={doSearch} className="btn-primary">ค้นหา</button>
          </div>
          {(q||result)&&<button onClick={()=>{setQ("");setResult(null);setErr("");ref.current?.focus();}} className="btn-clear">ล้างข้อมูล</button>}
          {err&&<div className="err-box">{err}</div>}
        </section>

        {/* TABS */}
        <nav className="tabs">
          {[
            {k:"search",l:"ผลค้นหา"},
            {k:"schedule",l:"ตารางวันตรวจ"},
            {k:"prep",l:"ขั้นตอนการรับบริการ"},
            {k:"stats",l:"สถิติ"},
          ].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              className={`tab ${tab===t.k?"tab-active":""}`}>{t.l}</button>
          ))}
        </nav>

        {/* === TAB SEARCH === */}
        {tab==="search"&&(
          <section className="tab-content">
            {result?(
              <div className="result" style={{opacity:anim?1:0,transform:anim?"none":"translateY(8px)"}}>

                <div className="banner-ok">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#00703C" strokeWidth="1.5"/><path d="M6 10l3 3 5-5" stroke="#00703C" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <span>พบข้อมูลในระบบ</span>
                </div>

                <div className="person-header">
                  <div className="person-label">ข้อมูลเจ้าหน้าที่</div>
                  <h2 className="person-name">{result.name}</h2>
                  <span className="right-tag" style={{background:rTag.bg,color:rTag.c}}>{rTag.l}</span>
                </div>

                {/* Exam Date Banner */}
                <div className="exam-date-banner">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="#1D70B8" strokeWidth="1.5"/><path d="M3 8h14" stroke="#1D70B8" strokeWidth="1.5"/><path d="M7 2v4M13 2v4" stroke="#1D70B8" strokeWidth="1.5" strokeLinecap="round"/></svg>
                  <div className="exam-date-text">
                    <span className="exam-date-label">วันที่เข้ารับการตรวจ</span>
                    <span className="exam-date-value">{getExamDate(result.unit)}</span>
                  </div>
                  {result.unit&&<span className="exam-unit-tag">{result.unit}</span>}
                </div>

                {/* Info Cards */}
                <div className="info-grid">
                  <div className="info-card">
                    <div className="info-label">เลขบัตรประชาชน</div>
                    <div className="info-value mono">{fmtId(result.id)}</div>
                  </div>
                  <div className="info-card">
                    <div className="info-label">อายุ</div>
                    <div className="info-value">{result.age} ปี</div>
                  </div>
                  <div className="info-card">
                    <div className="info-label">กลุ่มอายุ</div>
                    <div className="info-value">{result.age<35?"น้อยกว่า 35 ปี":"35 ปีขึ้นไป"}</div>
                  </div>
                  <div className="info-card">
                    <div className="info-label">รายการตรวจ</div>
                    <div className="info-value">{labs.length} รายการ</div>
                  </div>
                </div>

                {/* Lab */}
                <h3 className="section-title">รายการตรวจทางห้องปฏิบัติการ</h3>
                <p className="section-sub">
                  {result.right==="ประกันสังคม"?"รายการที่สามารถตรวจได้ตามสิทธิ์":result.age<35?"กลุ่มอายุน้อยกว่า 35 ปี":"กลุ่มอายุ 35 ปีขึ้นไป"}
                </p>

                {labs.length>0?(
                  <div className="lab-list">
                    {labs.map((lab,i)=>{
                      const info=LAB_INFO[lab]||{};
                      return(
                        <div key={i} className="lab-card">
                          <div className="lab-num">{i+1}</div>
                          <div className="lab-body">
                            <div className="lab-en">{info.en||lab}</div>
                            <div className="lab-th">{info.th||""}</div>
                          </div>
                          <span className="lab-cat" style={{background:catBg(info.cat),color:catFg(info.cat)}}>{info.cat||"-"}</span>
                        </div>
                      );
                    })}
                  </div>
                ):(
                  <div className="warn-box">ไม่พบรายการตรวจในไฟล์ กรุณาติดต่อฝ่ายบุคคล</div>
                )}

                {result.right==="ประกันสังคม"&&(
                  <div className="sso-note">
                    <div className="sso-note-title">
                      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#B45309" strokeWidth="1.5"/><path d="M10 6v5M10 13.5v.5" stroke="#B45309" strokeWidth="1.5" strokeLinecap="round"/></svg>
                      หมายเหตุสิทธิประกันสังคม
                    </div>
                    {result.age<35&&<div className="sso-note-item">• อายุน้อยกว่า 35 ปี ตรวจได้ 5 ปี / 1 ครั้ง</div>}
                    <div className="sso-note-item">• กรุณายื่นใบนำทางที่งานประกันก่อนเจาะเลือด เพื่อขอ Authen และตรวจสอบรายการประกันสังคม</div>
                  </div>
                )}
              </div>
            ):(
              <div className="empty">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{opacity:0.18}}><circle cx="21" cy="21" r="14" stroke="#505A5F" strokeWidth="2.5"/><path d="M31 31L42 42" stroke="#505A5F" strokeWidth="2.5" strokeLinecap="round"/></svg>
                <p className="empty-title">กรอกเลขบัตรประชาชนเพื่อค้นหา</p>
                <p className="empty-sub">ระบบจะแสดงชื่อ สิทธิ์ และรายการแลป</p>
              </div>
            )}
          </section>
        )}

        {/* === TAB SCHEDULE === */}
        {tab==="schedule"&&(
          <section className="tab-content">
            <h3 className="section-title">ตารางวันตรวจสุขภาพ</h3>
            <p className="section-sub">23–27 มีนาคม 2569</p>
            <div className="schedule-list">
              {SCHEDULE.map((r,i)=>{
                const isToday = r.date === getTodaySchedDate();
                return(
                <div key={i} className={`sched-card ${isToday?"sched-today":""}`}>
                  <div className={`sched-no ${isToday?"sched-no-today":""}`}>{r.no}</div>
                  <div className="sched-body">
                    <div className="sched-unit">{r.unit}{isToday&&<span className="sched-today-badge">วันนี้</span>}</div>
                    <div className={`sched-date ${isToday?"sched-date-today":""}`}>{r.date}</div>
                  </div>
                </div>
                );
              })}
            </div>
            <div className="warn-box" style={{marginTop:"16px"}}>หากวันตรวจตรงกับลา/ลงเวร สามารถตรวจวันอื่นได้</div>
          </section>
        )}

        {/* === TAB PREP === */}
        {tab==="prep"&&(
          <section className="tab-content">

            {/* การเตรียมตัวก่อนตรวจสุขภาพ */}
            <h3 className="section-title">การเตรียมตัวก่อนตรวจสุขภาพ</h3>
            <p className="section-sub">สิ่งที่ต้องปฏิบัติก่อนวันตรวจ</p>
            <div className="prep-list">
              <div className="prep-card">
                <div className="prep-num prep-num-imp">1</div>
                <div className="prep-body">
                  <div className="prep-title">งดอาหารก่อนเจาะเลือด FBS<span className="badge-imp">สำคัญ</span></div>
                  <div className="prep-desc">ผู้ที่ต้องตรวจ FBS (Fasting Blood Sugar) ต้องงดอาหารอย่างน้อย 8–10 ชั่วโมงก่อนการเจาะเลือด ดื่มน้ำเปล่าได้ตามปกติ</div>
                </div>
              </div>
              <div className="prep-card">
                <div className="prep-num prep-num-imp">2</div>
                <div className="prep-body">
                  <div className="prep-title">งดอาหารก่อนเจาะเลือด Lipid<span className="badge-imp">สำคัญ</span></div>
                  <div className="prep-desc">ผู้ที่ต้องตรวจ Lipid (Lipid Profile, Cholesterol, Triglyceride, HDL, LDL) ต้องงดอาหารอย่างน้อย 12 ชั่วโมงก่อนเจาะเลือดตรวจ ดื่มน้ำเปล่าได้ตามปกติ</div>
                </div>
              </div>
            </div>

            {/* ขั้นตอนการรับบริการ */}
            <h3 className="section-title" style={{marginTop:"28px"}}>ขั้นตอนการรับบริการ</h3>
            <p className="section-sub">ลำดับขั้นตอนในวันตรวจสุขภาพ</p>
            <div className="prep-list">
              <div className="prep-card">
                <div className="prep-num">1</div>
                <div className="prep-body">
                  <div className="prep-title">ลงทะเบียนเข้ารับบริการ</div>
                  <div className="prep-desc">ใช้บัตรประชาชนยืนยันตัวตน เพื่อรับใบนำทางและรับคิวตรวจ</div>
                </div>
              </div>
              <div className="prep-card">
                <div className="prep-num">2</div>
                <div className="prep-body">
                  <div className="prep-title">วัด Vital Sign / ชั่งน้ำหนัก / วัดรอบเอว</div>
                  <div className="prep-desc">วัดความดัน ชีพจร ชั่งน้ำหนัก วัดรอบเอว ที่จุดประชาสัมพันธ์ พร้อมแนบผลที่ใบนำทาง</div>

              </div>
              <div className="prep-card prep-card-sub">
                <div className="prep-num prep-num-sso">2.1</div>

                  <div className="prep-title">สิทธิประกันสังคม</div>
                  <div className="prep-desc">ยื่นใบนำทางที่งานประกัน ขอ Authen + ตรวจสอบรายการตรวจ ก่อนเข้ารับบริการ</div>
                </div>
              </div>
              <div className="prep-card">
                <div className="prep-num">3</div>
                <div className="prep-body">
                  <div className="prep-title">เจาะเลือดและตรวจปัสสาวะ</div>
                  <div className="prep-desc">นำใบนำทางยื่นที่ห้องแลป / งานเวช เพื่อเจาะเลือด (หน่วยงานใดที่ประสงค์เจาะเลือดเอง ให้นำ Specimen ส่งที่งานเวช พร้อมใบนำทาง) และตรวจปัสสาวะ (Clean-Voided Midstream Urine) ควรเก็บและส่งภายใน 2 ชั่วโมง</div>
                </div>
              </div>
              <div className="prep-card">
                <div className="prep-num">4</div>
                <div className="prep-body">
                  <div className="prep-title">ถ่ายภาพรังสี Chest X-Ray</div>

              </div>
              <div className="prep-card">
                <div className="prep-num">5</div>
                <div className="prep-body">
                  <div className="prep-title">พบแพทย์ฟังผล</div>
                  <div className="prep-desc">หากต้องการพบแพทย์ ให้รับใบนำทางที่ OPD แล้วเข้าพบแพทย์ตอนบ่าย 15.00 น. เป็นต้นไป</div>
                </div>
              </div>
            </div>
          </section>
        )}

        {/* === TAB STATS === */}
        {tab==="stats"&&(
          <section className="tab-content">
            <h3 className="section-title">สถิติภาพรวม</h3>
            <div className="stat-grid">
              {[
                {l:"ทั้งหมด",v:stats.total,c:"#1D70B8"},
                {l:"< 35 ปี",v:stats.u35,c:"#0EA5E9"},
                {l:">= 35 ปี",v:stats.o35,c:"#D97706"},
                {l:"ประเภทสิทธิ์",v:Object.keys(stats.byRight).length,c:"#00703C"},
              ].map((c,i)=>(
                <div key={i} className="stat-card">
                  <div className="stat-val" style={{color:c.c}}>{c.v}</div>
                  <div className="stat-label">{c.l}</div>
                </div>
              ))}
            </div>

            <h4 className="subsection-title">จำแนกตามสิทธิ์</h4>
            <div className="rights-list">
              {Object.entries(stats.byRight).sort((a,b)=>b[1]-a[1]).map(([r,n],i)=>{
                const t=rt(r);
                return(
                  <div key={i} className="rights-row">
                    <span className="right-tag-sm" style={{background:t.bg,color:t.c}}>{t.l}</span>
                    <div className="rights-bar-wrap">
                      <div className="rights-bar" style={{width:`${(n/stats.total*100)}%`,background:t.c}}/>

                {t:"เบิกได้ / UC / โครงการฟรี",s:"อายุ ≥ 35 ปี — 12 รายการ",d:"CBC, Urine, FBS, BUN, Cr, Chol, TG, UA, AST, ALT, ALP, CXR"},
                {t:"ประกันสังคม",s:"ทุกกลุ่มอายุ",d:"รายการตามสิทธิ์ + Chest X-Ray (ทุกคน)"},
              ].map((c,i)=>(
                <div key={i} className="cond-card">
                  <div className="cond-title">{c.t}</div>
                  <div className="cond-sub">{c.s}</div>
                  <div className="cond-desc">{c.d}</div>
                </div>
              ))}
            </div>
          </section>
        )}

        {/* FOOTER */}
        <footer className="footer">

        </footer>
      </main>

        .prep-body{flex:1;min-width:0}
        .prep-title{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .prep-desc{font-size:13px;color:#6B7280;line-height:1.5}
        .badge-imp{padding:1px 8px;font-size:11px;font-weight:700;background:#FEE2E2;color:#991B1B}

        /* STATS */
        .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#E5E7EB;border:1px solid #E5E7EB;margin-bottom:24px}
        .stat-card{background:#fff;padding:16px;text-align:center}
        .stat-val{font-size:28px;font-weight:700;line-height:1}

        /* PRINT */
        @media print{
          .topbar,.hero,.tabs,.btn-primary,.btn-clear,.search-section{display:none!important}
          .tab-content{padding-top:0}
        }
      `}</style>
    </div>
  );
}
