function getLabs(p) {
  if (p.right === "ประกันสังคม") {
    if (!p.lab) return [];
    return p.lab.split(",").map(s => s.trim()).filter(Boolean);
  }
  if (p.age < 35) return ["CBC","Urine Analysis","CXR"];
  return ["CBC","Urine Analysis","FBS","BUN","Creatinine","Cholesterol","Triglyceride","Uric acid","AST","ALT","ALP","CXR"];
}

function fmtId(id) {
  if (!id || id.length !== 13) return id;
  return `${id[0]}-${id.slice(1,5)}-${id.slice(5,10)}-${id.slice(10,12)}-${id[12]}`;
}

  },[]);

  const doSearch=()=>{
    const c=q.replace(/[\s-]/g,"");
    if(/^\d+$/.test(c)){
      if(c.length!==13){setErr("กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก");setResult(null);return;}
      const f=STAFF.find(s=>s.id===c);
      if(!f){setErr("ไม่พบข้อมูลในระบบ กรุณาตรวจสอบอีกครั้ง");setResult(null);return;}
      setErr("");setAnim(false);setTimeout(()=>{setResult(f);setAnim(true);setTab("search");},30);
    } else {
      const rs=STAFF.filter(s=>s.name.includes(q.trim()));
      if(rs.length===1){setErr("");setAnim(false);setTimeout(()=>{setResult(rs[0]);setAnim(true);setTab("search");},30);}
      else if(rs.length>1){setErr(`พบ ${rs.length} รายการ กรุณาใช้เลขบัตร 13 หลัก`);setResult(null);}
      else{setErr("ไม่พบชื่อในระบบ");setResult(null);}
    }
  };

  const labs=result?getLabs(result):[];
  const rTag=result?rt(result.right):null;

              <div className="result" style={{opacity:anim?1:0,transform:anim?"none":"translateY(8px)"}}>

                <div className="banner-ok">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#00703C" strokeWidth="1.5"/><path d="M6 10l3 3 5-5" stroke="#00703C" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <span>พบข้อมูลในระบบ</span>
                </div>

                <div className="person-header">
                  <div className="person-label">ข้อมูลเจ้าหน้าที่</div>
                  <h2 className="person-name">{result.name}</h2>
                  <span className="right-tag" style={{background:rTag.bg,color:rTag.c}}>{rTag.l}</span>
                </div>

                {/* Info Cards */}
                <div className="info-grid">
                  <div className="info-card">
                    <div className="info-label">เลขบัตรประชาชน</div>
                    <div className="info-value mono">{fmtId(result.id)}</div>
                  </div>
                  <div className="info-card">
                    <div className="info-label">อายุ</div>
                    <div className="info-value">{result.age} ปี</div>
                  </div>
                  <div className="info-card">
                    <div className="info-label">กลุ่มอายุ</div>
                    <div className="info-value">{result.age<35?"น้อยกว่า 35 ปี":"35 ปีขึ้นไป"}</div>
                  </div>
                  <div className="info-card">
                    <div className="info-label">รายการตรวจ</div>
                    <div className="info-value">{labs.length} รายการ</div>
                  </div>
                </div>

                {/* Lab */}
                <h3 className="section-title">รายการตรวจทางห้องปฏิบัติการ</h3>
                <p className="section-sub">
                  {result.right==="ประกันสังคม"?"รายการที่สามารถตรวจได้ตามสิทธิ์":result.age<35?"กลุ่มอายุน้อยกว่า 35 ปี":"กลุ่มอายุ 35 ปีขึ้นไป"}
                </p>

                {labs.length>0?(
                  <div className="lab-list">
                    {labs.map((lab,i)=>{
                      const info=LAB_INFO[lab]||{};
                      return(
                        <div key={i} className="lab-card">
                          <div className="lab-num">{i+1}</div>
                          <div className="lab-body">
                            <div className="lab-en">{info.en||lab}</div>
                            <div className="lab-th">{info.th||""}</div>
                          </div>
                          <span className="lab-cat" style={{background:catBg(info.cat),color:catFg(info.cat)}}>{info.cat||"-"}</span>
                        </div>
                      );
                    })}
                  </div>
                ):(
                  <div className="warn-box">ไม่พบรายการตรวจในไฟล์ กรุณาติดต่อฝ่ายบุคคล</div>
                )}

                {result.right==="ประกันสังคม"&&(
                  <div className="info-box blue">
                    <div className="info-box-title">หมายเหตุสิทธิประกันสังคม</div>
                    {result.age<35&&<div>• อายุน้อยกว่า 35 ปี ตรวจได้ 5 ปี / 1 ครั้ง</div>}
                    <div>• กรุณายื่นใบที่งานประกัน เพื่อขอ Authen และตรวจสอบรายการ</div>
                  </div>
                )}
                {result.right!=="ประกันสังคม"&&(
                  <div className="info-box gray">
                    เจ้าหน้าที่สิทธิ์ UC นอกเขต ให้เป็นสิทธิ์โครงการฟรี / ทุกท่านได้รับ Chest X-ray
                  </div>
                )}
              </div>
            ):(
              <div className="empty">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{opacity:0.18}}><circle cx="21" cy="21" r="14" stroke="#505A5F" strokeWidth="2.5"/><path d="M31 31L42 42" stroke="#505A5F" strokeWidth="2.5" strokeLinecap="round"/></svg>
                <p className="empty-title">กรอกเลขบัตรประชาชนเพื่อค้นหา</p>
                <p className="empty-sub">ระบบจะแสดงชื่อ สิทธิ์ และรายการแลป</p>
              </div>
            )}
          </section>
        )}

        {/* === TAB SCHEDULE === */}
        {tab==="schedule"&&(
          <section className="tab-content">
            <h3 className="section-title">ตารางวันตรวจสุขภาพ</h3>
            <p className="section-sub">23–27 มีนาคม 2569</p>
            <div className="schedule-list">
              {SCHEDULE.map((r,i)=>(
                <div key={i} className="sched-card">
                  <div className="sched-no">{r.no}</div>
                  <div className="sched-body">
                    <div className="sched-unit">{r.unit}</div>
                    <div className="sched-date">{r.date}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="warn-box" style={{marginTop:"16px"}}>หากวันตรวจตรงกับลา/ลงเวร สามารถตรวจวันอื่นได้</div>
          </section>
        )}

        {/* === TAB PREP === */}
        {tab==="prep"&&(
          <section className="tab-content">
            <h3 className="section-title">การเตรียมตัวก่อนตรวจ</h3>
            <p className="section-sub">ขั้นตอนการรับบริการ</p>
            <div className="prep-list">
              {[
                {s:"1",t:"ลงทะเบียนเข้ารับบริการ",d:"ใช้บัตรประชาชนยืนยันตัวตน รับใบนำทาง",imp:false},
                {s:"2",t:"วัด Vital Sign / ชั่งน้ำหนัก",d:"วัดความดัน ชีพจร วัดรอบเอว",imp:false},
                {s:"3",t:"งดอาหาร 8-10 ชม. ก่อนเจาะเลือด",d:"FBS ดื่มน้ำเปล่าได้ / Lipid งด 12 ชม.",imp:true},
                {s:"4",t:"นำใบนำทางพร้อมบัตรประชาชนยื่นที่ห้อง LAB หรืองานเวช",d:"เพื่อทำการเจาะเลือด (หน่วยงานใดที่ประสงค์เจาะเลือดเอง ให้นำ specimen ส่งที่งานเวช พร้อมใบนำทาง)",imp:false},
                {s:"5",t:"เก็บปัสสาวะ",d:"clean-voided midstream / ส่งภายใน 2 ชม.",imp:false},
                {s:"6",t:"ถ่ายเอกซเรย์ปอด",d:"เช้าหรือบ่าย ก่อน 14.00 น.",imp:false},
                {s:"7",t:"พบแพทย์ฟังผล",d:"15.00 น. เป็นต้นไป รับใบนำทางที่ OPD",imp:false},
              ].map((p,i)=>(
                <div key={i} className="prep-card">
                  <div className={`prep-num ${p.imp?"prep-num-imp":""}`}>{p.s}</div>
                  <div className="prep-body">
                    <div className="prep-title">{p.t}{p.imp&&<span className="badge-imp">สำคัญ</span>}</div>
                    <div className="prep-desc">{p.d}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="info-box blue" style={{marginTop:"16px"}}>
              <div className="info-box-title">สิทธิประกันสังคม</div>
              ยื่นใบที่งานประกัน ขอ Authen + ตรวจสอบรายการตรวจ ก่อนเข้ารับบริการ
            </div>
          </section>
        )}

        {/* === TAB STATS === */}
        {tab==="stats"&&(
          <section className="tab-content">
            <h3 className="section-title">สถิติภาพรวม</h3>
            <div className="stat-grid">
              {[
                {l:"ทั้งหมด",v:stats.total,c:"#1D70B8"},
                {l:"< 35 ปี",v:stats.u35,c:"#0EA5E9"},
                {l:">= 35 ปี",v:stats.o35,c:"#D97706"},
                {l:"ประเภทสิทธิ์",v:Object.keys(stats.byRight).length,c:"#00703C"},
              ].map((c,i)=>(
                <div key={i} className="stat-card">
                  <div className="stat-val" style={{color:c.c}}>{c.v}</div>
                  <div className="stat-label">{c.l}</div>
                </div>
              ))}
            </div>

            <h4 className="subsection-title">จำแนกตามสิทธิ์</h4>
            <div className="rights-list">
              {Object.entries(stats.byRight).sort((a,b)=>b[1]-a[1]).map(([r,n],i)=>{
                const t=rt(r);
                return(
                  <div key={i} className="rights-row">
                    <span className="right-tag-sm" style={{background:t.bg,color:t.c}}>{t.l}</span>
                    <div className="rights-bar-wrap">
                      <div className="rights-bar" style={{width:`${(n/stats.total*100)}%`,background:t.c}}/>
                    </div>
                    <span className="rights-count">{n} ({Math.round(n/stats.total*100)}%)</span>
                  </div>
                );
              })}
            </div>

            <h4 className="subsection-title">เงื่อนไขรายการตรวจ</h4>
            <div className="cond-list">
              {[
                {t:"เบิกได้ / UC / โครงการฟรี",s:"อายุ < 35 ปี — 3 รายการ",d:"CBC, Urine Analysis, CXR"},
                {t:"เบิกได้ / UC / โครงการฟรี",s:"อายุ ≥ 35 ปี — 12 รายการ",d:"CBC, Urine, FBS, BUN, Cr, Chol, TG, UA, AST, ALT, ALP, CXR"},
                {t:"ประกันสังคม",s:"ทุกกลุ่มอายุ",d:"รายการที่สามารถตรวจได้ตามสิทธิ์"},
              ].map((c,i)=>(
                <div key={i} className="cond-card">
                  <div className="cond-title">{c.t}</div>
                  <div className="cond-sub">{c.s}</div>
                  <div className="cond-desc">{c.d}</div>
                </div>
              ))}
            </div>
          </section>
        )}

        {/* FOOTER */}
        <footer className="footer">
          <div>กลุ่มงานบริการด้านปฐมภูมิแบบองค์รวม รพ.ทับคล้อ</div>
          <div>ข้อมูลในระบบ {STAFF.length} คน</div>
        </footer>
      </main>

      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        .app{min-height:100vh;background:#fff;font-family:'IBM Plex Sans Thai','Sarabun',system-ui,sans-serif;color:#0B0C0C;font-size:16px;line-height:1.6;-webkit-text-size-adjust:100%}
        .container{max-width:960px;margin:0 auto;padding:0 16px}

        /* TOPBAR */
        .topbar{background:#1D2942;padding:12px 0;border-bottom:3px solid #1D70B8}
        .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
        .topbar-left{display:flex;align-items:center;gap:10px;color:#fff}
        .topbar-text{display:flex;flex-direction:column;line-height:1.2}
        .topbar-org{font-size:11px;color:#93C5FD;font-weight:500;letter-spacing:0.3px}
        .topbar-hosp{font-size:15px;font-weight:600;color:#fff}
        .topbar-year{font-size:12px;color:#94A3B8}

        /* HERO */
        .hero{background:#1D70B8;padding:24px 0 28px}
        .hero-title{font-size:clamp(20px,5vw,30px);font-weight:700;color:#fff;line-height:1.25;margin-bottom:4px}
        .hero-sub{font-size:15px;color:#D2E2F1}

        /* MAIN */
        .main{padding-bottom:24px}

        /* SEARCH */
        .search-section{padding:20px 0;border-bottom:1px solid #E5E7EB}
        .label{font-size:17px;font-weight:700;margin-bottom:4px;display:block}
        .hint{font-size:13px;color:#6B7280;display:block;margin-bottom:10px}
        .search-row{display:flex;gap:0}
        .search-input{flex:1;min-width:0;padding:12px 14px;font-size:18px;font-family:inherit;border:2px solid #0B0C0C;border-right:none;outline:none}
        .search-input:focus{outline:3px solid #FFD700;outline-offset:0;z-index:1}
        .search-input-err{border-color:#D4351C}
        .search-input::placeholder{color:#B1B4B6;font-size:15px}
        .btn-primary{padding:12px 20px;font-size:16px;font-weight:700;font-family:inherit;border:none;background:#00703C;color:#fff;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
        .btn-primary:active{background:#005A30}
        .btn-clear{margin-top:10px;padding:8px 16px;font-size:13px;font-family:inherit;border:1px solid #B1B4B6;background:#fff;color:#0B0C0C;cursor:pointer}
        .err-box{margin-top:12px;padding:12px 16px;border-left:4px solid #D4351C;background:#FDF0ED;font-size:14px;color:#6A0B00;font-weight:500}

        /* TABS */
        .tabs{display:flex;gap:0;border-bottom:1px solid #B1B4B6;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .tabs::-webkit-scrollbar{display:none}
        .tab{padding:12px 16px;font-size:14px;font-weight:400;font-family:inherit;border:none;border-bottom:4px solid transparent;background:none;color:#6B7280;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
        .tab-active{font-weight:700;color:#1D70B8;border-bottom-color:#1D70B8}

        /* TAB CONTENT */
        .tab-content{padding:20px 0 28px}

        /* RESULT */
        .result{transition:all 0.35s ease}
        .banner-ok{padding:12px 16px;background:#CCE2D8;border-left:4px solid #00703C;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#00703C;margin-bottom:20px}
        .person-header{border-left:4px solid #1D70B8;padding-left:16px;margin-bottom:20px}
        .person-label{font-size:12px;color:#6B7280;font-weight:500;margin-bottom:2px}
        .person-name{font-size:clamp(22px,5vw,28px);font-weight:700;line-height:1.2;margin-bottom:8px}
        .right-tag{display:inline-block;padding:4px 14px;font-size:14px;font-weight:600}

        /* INFO GRID */
        .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#E5E7EB;border:1px solid #E5E7EB;margin-bottom:24px}
        .info-card{background:#fff;padding:14px 16px}
        .info-label{font-size:12px;color:#6B7280;margin-bottom:1px}
        .info-value{font-size:16px;font-weight:600}
        .mono{font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:0.5px}

        /* LAB LIST — mobile-friendly cards */
        .lab-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
        .lab-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #F3F2F1;background:#FAFAFA;-webkit-tap-highlight-color:transparent}
        .lab-num{width:28px;height:28px;border-radius:50%;background:#1D70B8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
        .lab-body{flex:1;min-width:0}
        .lab-en{font-size:15px;font-weight:600;color:#0B0C0C}
        .lab-th{font-size:13px;color:#6B7280}
        .lab-cat{padding:2px 10px;font-size:11px;font-weight:600;flex-shrink:0;white-space:nowrap}

        /* INFO BOX */
        .info-box{margin-top:16px;padding:14px 16px;font-size:14px;line-height:1.7}
        .info-box.blue{background:#F0F6FC;border-left:4px solid #1D70B8;color:#003078}
        .info-box.gray{background:#F3F2F1;border-left:4px solid #B1B4B6;color:#383F43}
        .info-box-title{font-weight:700;margin-bottom:2px}
        .warn-box{padding:14px 16px;background:#FFF7BF;border-left:4px solid #FFD700;font-size:14px;color:#594D00}

        /* EMPTY */
        .empty{text-align:center;padding:48px 16px}
        .empty-title{font-size:17px;font-weight:600;color:#6B7280;margin:12px 0 4px}
        .empty-sub{font-size:14px;color:#B1B4B6}

        /* SCHEDULE */
        .schedule-list{display:flex;flex-direction:column;gap:6px}
        .sched-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid #F3F2F1;background:#FAFAFA}
        .sched-no{width:32px;height:32px;border-radius:50%;background:#1D70B8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
        .sched-body{flex:1}
        .sched-unit{font-size:15px;font-weight:600}
        .sched-date{font-size:13px;color:#6B7280}

        /* PREP */
        .prep-list{display:flex;flex-direction:column;gap:4px}
        .prep-card{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #F3F2F1}
        .prep-card:last-child{border-bottom:none}
        .prep-num{width:30px;height:30px;border-radius:50%;background:#F3F2F1;color:#383F43;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
        .prep-num-imp{background:#1D70B8;color:#fff}
        .prep-body{flex:1;min-width:0}
        .prep-title{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .prep-desc{font-size:13px;color:#6B7280;line-height:1.5}
        .badge-imp{padding:1px 8px;font-size:11px;font-weight:700;background:#FEE2E2;color:#991B1B}

        /* STATS */
        .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#E5E7EB;border:1px solid #E5E7EB;margin-bottom:24px}
        .stat-card{background:#fff;padding:16px;text-align:center}
        .stat-val{font-size:28px;font-weight:700;line-height:1}
        .stat-label{font-size:13px;color:#6B7280;margin-top:4px}
        .section-title{font-size:19px;font-weight:700;margin-bottom:4px}
        .section-sub{font-size:13px;color:#6B7280;margin-bottom:14px}
        .subsection-title{font-size:16px;font-weight:700;margin:0 0 10px}
        .rights-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
        .rights-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .right-tag-sm{padding:3px 12px;font-size:12px;font-weight:600;flex-shrink:0;min-width:100px;text-align:center}
        .rights-bar-wrap{flex:1;min-width:60px;height:8px;background:#F3F2F1}
        .rights-bar{height:100%;transition:width 0.5s}
        .rights-count{font-size:13px;font-weight:600;color:#6B7280;min-width:70px;text-align:right}
        .cond-list{display:flex;flex-direction:column;gap:10px}
        .cond-card{padding:14px 16px;background:#F0F6FC;border-left:4px solid #1D70B8}
        .cond-title{font-size:14px;font-weight:700}
        .cond-sub{font-size:13px;font-weight:600;color:#1D70B8;margin-bottom:4px}
        .cond-desc{font-size:13px;color:#6B7280}

        /* FOOTER */
        .footer{border-top:1px solid #E5E7EB;padding:16px 0;display:flex;flex-direction:column;gap:2px;font-size:12px;color:#B1B4B6;text-align:center;margin-top:8px}

        /* RESPONSIVE — tablets */
        @media(min-width:640px){
          .container{padding:0 24px}
          .info-grid{grid-template-columns:repeat(4,1fr)}
          .stat-grid{grid-template-columns:repeat(4,1fr)}
          .footer{flex-direction:row;justify-content:space-between;text-align:left}
        }

        /* PRINT */
        @media print{
          .topbar,.hero,.tabs,.btn-primary,.btn-clear,.search-section{display:none!important}
          .tab-content{padding-top:0}
        }
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
